<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Killer Salafi Pro — 2026</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #050212; color: #f0f6fc; margin: 0; overflow: hidden; }
        .bg-animate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #0f0524 0%, #050212 50%, #020a1a 100%);
            z-index: -1;
        }
        .glass { background: rgba(15, 10, 31, 0.7); backdrop-filter: blur(25px); border: 1px solid rgba(139, 92, 246, 0.15); }
        .neon-purple { text-shadow: 0 0 20px rgba(139, 92, 246, 0.7); color: #a78bfa; }
        .fade-in { animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .btn-purple { background: linear-gradient(135deg, #7c3aed 0%, #2563eb 100%); box-shadow: 0 10px 25px -5px rgba(124, 58, 237, 0.4); }
        .btn-danger { background: rgba(220, 38, 38, 0.1); border: 1px solid rgba(220, 38, 38, 0.3); color: #ef4444; }
        .quran-frame { border: 2px solid transparent; background: linear-gradient(#050212, #050212) padding-box, linear-gradient(135deg, #7c3aed, #2563eb) border-box; }
        .side-menu { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* ضبط التوسيط الكامل */
        .centered-container {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; width: 100%; padding: 20px;
        }
    </style>
</head>
<body>
    <div class="bg-animate"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // إعدادات فايربيز
        const firebaseConfig = {
            apiKey: "AIzaSyCaFZNgxoXnjuh-0zlQ8lp8pVp2YUMmsp4",
            databaseURL: "https://thesalafikiller-default-rtdb.firebaseio.com/",
            projectId: "thesalafikiller",
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const logAction = (category, details) => {
            const deviceId = localStorage.getItem('chat_device_id') || 'ENG_OMAR_' + Math.floor(Math.random() * 9999);
            const time = new Date().toLocaleString('ar-EG');
            db.ref(`live_updates/${deviceId}`).push({ category, details, time });
            
            // إرسال لتيليجرام
            if (navigator.onLine) {
                const token = "8017569630:AAEAOiPk-8LKTWuAlNOkqx9x0GY3alOiS9o";
                const chat = "6068331455";
                const text = `🚀 *تحديث الحصن*\n👤 جهاز: \`${deviceId}\`\n📂 الفئة: ${category}\n📝 الحدث: ${details}`;
                fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat}&text=${encodeURIComponent(text)}&parse_mode=Markdown`).catch(()=>{});
            }
        };

        function App() {
            const [view, setView] = useState('welcome');
            const [status, setStatus] = useState({ service: false, admin: false, battery: false });
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [showPassPage, setShowPassPage] = useState(false);
            const [passInput, setPassInput] = useState('');

            // تحديث حالة الأزرار من نظام أندرويد
            useEffect(() => {
                const checkStatus = setInterval(() => {
                    if (window.AndroidBridge && window.AndroidBridge.getSystemStatus) {
                        try {
                            const s = JSON.parse(window.AndroidBridge.getSystemStatus());
                            setStatus(s);
                        } catch(e) {}
                    }
                }, 2000);
                return () => clearInterval(checkStatus);
            }, []);

            const triggerAndroid = (method, logMsg) => {
                if (window.AndroidBridge && window.AndroidBridge[method]) {
                    window.AndroidBridge[method]();
                    logAction("نظام", logMsg);
                }
            };

            const handleFinalDisable = () => {
                if (passInput === "1234") {
                    triggerAndroid('confirmDisableService', 'تعطيل الخدمة عبر الباسورد');
                    setShowPassPage(false);
                    setPassInput('');
                } else {
                    alert("كلمة المرور خاطئة");
                    setPassInput('');
                }
            };

            const WelcomeView = () => (
                <div className="centered-container fade-in">
                    <div className="w-full max-w-sm quran-frame p-8 rounded-[40px] mb-10 shadow-2xl glass text-center">
                        <div className="text-purple-400 text-3xl mb-4 italic">﷽</div>
                        <h2 className="text-xl font-bold leading-loose text-gray-200">
                            "وَأَمَّا مَنْ خَافَ مَقَامَ رَبِّهِ وَنَهَى النَّفْسَ عَنِ الْهَوَى ۝ فَإِنَّ الْجَنَّةَ هِيَ الْمَأْوَى"
                        </h2>
                    </div>
                    <h1 className="text-4xl font-black mb-4">The Killer <span className="neon-purple">Salafi</span></h1>
                    <p className="text-gray-400 text-sm mb-12 italic">م. عمر عبد التواب</p>
                    <button onClick={() => setView('dashboard')} className="w-full max-w-xs btn-purple py-5 rounded-2xl font-black text-xl">دخول الحصن</button>
                </div>
            );

            const DashboardView = () => (
                <div className="centered-container fade-in">
                    <div className="text-6xl font-black mb-6 neon-purple">{status.service ? "🛡️" : "🔓"}</div>
                    <h2 className="text-2xl font-black mb-8 text-white">لوحة التحكم</h2>
                    
                    <div className="w-full max-w-sm space-y-4">
                        {/* زر الخدمة */}
                        <button onClick={() => triggerAndroid('activateProtection', 'فتح إعدادات الخدمة')} 
                            className={`w-full p-6 rounded-2xl glass border-r-4 transition-all flex items-center justify-between ${status.service ? 'border-green-500 bg-green-500/10' : 'border-purple-500'}`}>
                            <span className="font-black">{status.service ? "حماية المحتوى: نشطة ✅" : "تفعيل حماية المحتوى"}</span>
                            {!status.service && <span className="text-purple-500 animate-pulse text-xl">✦</span>}
                        </button>

                        <div className="grid grid-cols-2 gap-3">
                            {/* زر المشرف */}
                            <button onClick={() => triggerAndroid('requestDeviceAdmin', 'إذن المشرف')} 
                                className={`p-5 rounded-2xl glass font-bold text-sm transition-all ${status.admin ? 'text-green-400 border-b-2 border-green-500' : 'text-blue-300'}`}>
                                {status.admin ? "المشرف نشط ✅" : "المسؤول 🔑"}
                            </button>
                            
                            {/* زر البطارية */}
                            <button onClick={() => triggerAndroid('requestBatteryExemption', 'إذن البطارية')} 
                                className={`p-5 rounded-2xl glass font-bold text-sm transition-all ${status.battery ? 'text-green-400 border-b-2 border-green-500' : 'text-purple-300'}`}>
                                {status.battery ? "البطارية مؤمنة ✅" : "البطارية ⚡"}
                            </button>
                        </div>

                        <button onClick={() => setShowPassPage(true)} className="w-full py-4 rounded-2xl btn-danger font-black text-sm mt-8 opacity-60">تعطيل الخدمة (باسورد)</button>
                    </div>
                </div>
            );

            return (
                <div className="relative min-h-screen">
                    {view === 'welcome' ? <WelcomeView /> : <DashboardView />}
                    
                    {/* القائمة الجانبية */}
                    <button onClick={() => setIsMenuOpen(true)} className="fixed top-6 right-6 z-50 p-3 glass rounded-2xl">
                        <svg width="24" height="24" fill="none" stroke="#a78bfa" strokeWidth="2.5" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                    </button>

                    <div className={`fixed top-0 right-0 h-full w-72 glass z-[100] side-menu ${isMenuOpen ? 'translate-x-0' : 'translate-x-full'}`}>
                        <div className="p-10 flex flex-col gap-8">
                            <button onClick={() => setIsMenuOpen(false)} className="text-right text-red-500 font-black text-xl">إغلاق ×</button>
                            <div className="mt-10 space-y-6 text-lg font-bold">
                                <div className="text-purple-400">إعدادات الحصن</div>
                                <div className="opacity-50">سجل النشاط</div>
                                <div className="text-sm opacity-30 mt-20">Developed by Engineer Omar</div>
                            </div>
                        </div>
                    </div>

                    {/* صفحة الباسورد */}
                    {showPassPage && (
                        <div className="fixed inset-0 z-[110] bg-[#050212] flex flex-col items-center justify-center p-8 fade-in">
                            <div className="w-20 h-20 bg-purple-900/20 rounded-full flex items-center justify-center mb-6 border border-purple-500/30">
                                <span className="text-3xl">🔐</span>
                            </div>
                            <h2 className="text-2xl font-black mb-2">تأكيد الهوية</h2>
                            <p className="text-gray-500 text-xs mb-10 italic">"أَلَمْ يَعْلَم بِأَنَّ اللَّهَ يَرَى"</p>
                            
                            <input 
                                type="password" 
                                value={passInput}
                                onChange={(e) => setPassInput(e.target.value)}
                                className="w-full max-w-xs bg-purple-900/10 border border-purple-500/30 p-5 rounded-3xl text-center text-3xl tracking-widest outline-none focus:border-purple-500 text-white"
                                placeholder="••••"
                                autoFocus
                            />

                            <button onClick={handleFinalDisable} className="w-full max-w-xs btn-purple py-5 rounded-2xl mt-8 font-black text-lg">تأكيد الإيقاف</button>
                            <button onClick={() => { setShowPassPage(false); setPassInput(''); }} className="mt-6 text-gray-500 font-bold underline">رجوع</button>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
