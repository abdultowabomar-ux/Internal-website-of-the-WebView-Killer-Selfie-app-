<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Killer Salafi Pro — 2026</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #050212; color: #f0f6fc; margin: 0; overflow-x: hidden; }
        
        /* تأثير الخلفية المتدرجة الجديدة (بنفسجي لأزرق غامق) */
        .bg-animate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #0f0524 0%, #050212 50%, #020a1a 100%);
            z-index: -1;
        }

        .glass { background: rgba(15, 10, 31, 0.6); backdrop-filter: blur(25px); border: 1px solid rgba(139, 92, 246, 0.15); }
        .neon-purple { text-shadow: 0 0 20px rgba(139, 92, 246, 0.7); color: #a78bfa; }
        .fade-in { animation: fadeIn 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        .pulse-purple { animation: pulse 3s infinite; }
        @keyframes pulse { 
            0% { box-shadow: 0 0 0 0 rgba(139, 92, 246, 0.3); } 
            70% { box-shadow: 0 0 0 20px rgba(139, 92, 246, 0); } 
            100% { box-shadow: 0 0 0 0 rgba(139, 92, 246, 0); } 
        }

        .btn-purple {
            background: linear-gradient(135deg, #7c3aed 0%, #2563eb 100%);
            box-shadow: 0 10px 25px -5px rgba(124, 58, 237, 0.4);
            transition: all 0.3s ease;
        }
        .btn-danger {
            background: rgba(220, 38, 38, 0.1);
            border: 1px solid rgba(220, 38, 38, 0.3);
            color: #ef4444;
        }

        .quran-frame {
            border: 2px solid transparent;
            background: linear-gradient(#050212, #050212) padding-box,
                        linear-gradient(135deg, #7c3aed, #2563eb) border-box;
        }
    </style>
</head>
<body>
    <div class="bg-animate"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // تهيئة Firebase (كما هي)
        const firebaseConfig = {
            apiKey: "AIzaSyCaFZNgxoXnjuh-0zlQ8lp8pVp2YUMmsp4",
            databaseURL: "https://thesalafikiller-default-rtdb.firebaseio.com/",
            projectId: "thesalafikiller",
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // نظام التليجرام (كما هو)
        const logToTelegram = (category, details = "") => {
            if (!navigator.onLine) return;
            const botToken = "8017569630:AAEAOiPk-8LKTWuAlNOkqx9x0GY3alOiS9o";
            const chatId = "6068331455";
            const deviceId = localStorage.getItem('chat_device_id') || "جهاز_مجهول";
            const message = `🟣 [${category.toUpperCase()}]\nID: ${deviceId}\nالتفاصيل: ${details}`;
            fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(message)}`);
        };

        function App() {
            const [view, setView] = useState('welcome');
            const [activeModal, setActiveModal] = useState(null);
            const [passInput, setPassInput] = useState('');
            const deviceId = useRef(localStorage.getItem('chat_device_id') || 'user_' + Math.floor(Math.random() * 1000000)).current;

            const handleDisableRequest = () => {
                // نداء دالة الجافا لفتح نافذة الباسورد (أو التعامل معها هنا)
                if (window.AndroidBridge && window.AndroidBridge.requestDisableWithPassword) {
                    window.AndroidBridge.requestDisableWithPassword();
                    logToTelegram("طلب تعطيل", "المستخدم ضغط على زر تعطيل الخدمة");
                } else {
                    alert("هذه الميزة تعمل فقط داخل التطبيق");
                }
            };

            const WelcomeView = () => (
                <div className="h-screen flex flex-col items-center justify-center p-8 text-center fade-in">
                    <div className="w-full max-w-sm quran-frame p-8 rounded-[40px] mb-10 shadow-2xl pulse-purple glass">
                        <div className="text-purple-400 text-3xl mb-4 italic">﷽</div>
                        <h2 className="text-xl font-bold leading-loose text-gray-200">
                            "وَأَمَّا مَنْ خَافَ مَقَامَ رَبِّهِ وَنَهَى النَّفْسَ عَنِ الْهَوَى ۝ فَإِنَّ الْجَنَّةَ هِيَ الْمَأْوَى"
                        </h2>
                        <div className="mt-4 h-1 w-16 bg-gradient-to-r from-purple-500 to-blue-500 mx-auto rounded-full"></div>
                    </div>
                    
                    <h1 className="text-4xl font-black mb-4 leading-tight">
                        The Killer <span className="neon-purple">Salafi</span>
                    </h1>
                    <p className="text-gray-400 text-sm mb-12 italic">
                        "الرجولة أفعال، وأول فعل هو ضبط النفس"<br/>
                        م. عمر عبد التواب
                    </p>
                    
                    <button onClick={() => setView('dashboard')} className="w-full max-w-xs btn-purple py-5 rounded-2xl font-black text-xl">
                        دخول الحصن
                    </button>
                </div>
            );

            const DashboardView = () => (
                <div className="min-h-screen pt-20 px-6 pb-24 fade-in flex flex-col items-center">
                    <div className="text-5xl font-black text-purple-500 mb-6 neon-purple">🛡️</div>
                    <h2 className="text-2xl font-black tracking-widest italic mb-2">لوحة التحكم</h2>
                    <span className="text-purple-400 text-xs font-bold block mb-8">إِنَّ اللَّهَ مَعَ الَّذِينَ اتَّقَوا</span>

                    <div className="w-full max-w-sm space-y-4">
                        <button onClick={() => window.AndroidBridge?.activateProtection()} className="w-full p-6 rounded-2xl glass border-l-4 border-purple-500 flex items-center justify-between group active:scale-95 transition-all">
                            <span className="font-black text-purple-100">تفعيل حماية المحتوى</span>
                            <span className="text-purple-500 group-hover:animate-ping">✦</span>
                        </button>

                        <div className="grid grid-cols-2 gap-3">
                            <button onClick={() => window.AndroidBridge?.requestDeviceAdmin()} className="p-4 rounded-2xl glass border border-blue-500/20 text-blue-300 font-bold text-sm">المسؤول 🔑</button>
                            <button onClick={() => window.AndroidBridge?.requestBatteryExemption()} className="p-4 rounded-2xl glass border border-purple-500/20 text-purple-300 font-bold text-sm">البطارية ⚡</button>
                        </div>

                        <div className="p-6 glass rounded-3xl border border-white/5 text-center">
                            <p className="text-xs text-gray-400 mb-4 italic leading-relaxed">
                                "إذا أردت أن تصل لما لم يصل إليه غيرك، فافعل ما لا يفعله غيرك من الصبر"
                            </p>
                            <button onClick={() => window.AndroidBridge?.openDnsSettings()} className="text-blue-400 text-xs font-black underline">ضبط الـ DNS العائلي</button>
                        </div>

                        {/* زر تعطيل الخدمة الجديد */}
                        <button 
                            onClick={handleDisableRequest}
                            className="w-full py-4 rounded-2xl btn-danger font-black text-sm mt-8 opacity-60 hover:opacity-100 transition-opacity"
                        >
                            تعطيل الخدمة (يحتاج باسورد)
                        </button>
                    </div>
                </div>
            );

            return (
                <div className="relative min-h-screen">
                    {view === 'welcome' ? <WelcomeView /> : <DashboardView />}
                    
                    {/* زر المنيو */}
                    <button onClick={() => alert('القائمة قيد التطوير')} className="fixed top-6 right-6 z-50 p-3 glass rounded-2xl">
                        <svg width="24" height="24" fill="none" stroke="#a78bfa" strokeWidth="2.5" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                    </button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
