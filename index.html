
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The Killer Salafi Pro — 2026 | الحصن المتطور</title>
    
    <!-- Google Fonts + Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: #050212;
            color: #f0f6fc;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* خلفية ديناميكية هادئة */
        .bg-animate {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 20%, #0c0620, #02010a);
            z-index: -2;
        }
        .bg-orb {
            position: fixed;
            width: 80vw;
            height: 80vw;
            background: radial-gradient(circle, rgba(124,58,237,0.2) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            top: -15%;
            right: -20%;
            z-index: -1;
            animation: floatOrb 18s infinite alternate ease-in-out;
        }
        @keyframes floatOrb {
            0% { transform: translate(0,0) scale(1); opacity: 0.4; }
            100% { transform: translate(-6%, 8%) scale(1.12); opacity: 0.7; }
        }

        /* زجاج محسن */
        .glass {
            background: rgba(15, 10, 35, 0.6);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(139, 92, 246, 0.2);
            box-shadow: 0 12px 28px rgba(0,0,0,0.3), inset 0 0 0 0.5px rgba(139,92,246,0.2);
            transition: all 0.25s ease;
        }
        .glass-card {
            background: rgba(12, 6, 28, 0.7);
            backdrop-filter: blur(14px);
            border-radius: 2rem;
            border-left: 3px solid #a855f7;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .glass-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 30px -12px rgba(0,0,0,0.5);
            border-left-color: #c084fc;
        }

        .neon-purple {
            text-shadow: 0 0 8px #a855f7, 0 0 18px #7c3aed;
            color: #d8b4fe;
        }
        .btn-purple {
            background: linear-gradient(100deg, #7c3aed, #3b82f6);
            box-shadow: 0 8px 18px rgba(124,58,237,0.4);
            transition: all 0.2s;
            border: none;
        }
        .btn-purple:active {
            transform: scale(0.97);
            box-shadow: 0 4px 10px rgba(124,58,237,0.6);
        }
        .btn-danger {
            background: rgba(220, 38, 38, 0.12);
            border: 1px solid rgba(220, 38, 38, 0.4);
            backdrop-filter: blur(10px);
        }
        .ripple-effect {
            position: relative;
            overflow: hidden;
        }
        .ripple-effect:active::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            width: 300px;
            height: 300px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.4s, height 0.4s, opacity 0.3s;
            opacity: 0;
        }

        /* انتقالات ناعمة */
        .fade-in {
            animation: fadeSlide 0.5s cubic-bezier(0.2, 0.9, 0.4, 1) forwards;
        }
        @keyframes fadeSlide {
            0% { opacity: 0; transform: translateY(20px); filter: blur(2px);}
            100% { opacity: 1; transform: translateY(0); filter: blur(0);}
        }

        /* شاشة التحميل والرمز */
        .loader-ring {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(139,92,246,0.3);
            border-top: 4px solid #c084fc;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* القائمة الجانبية */
        .side-menu {
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            background: rgba(5, 2, 20, 0.92);
            backdrop-filter: blur(32px);
            border-left: 1px solid rgba(139,92,246,0.45);
        }
        .menu-item {
            display: flex;
            align-items: center;
            gap: 18px;
            padding: 14px 20px;
            border-radius: 60px;
            transition: 0.2s;
            font-weight: 700;
            cursor: pointer;
        }
        .menu-item:hover {
            background: rgba(124,58,237,0.25);
            transform: translateX(-6px);
        }
        
        /* تحسين التمرير */
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: #1a102f; }
        ::-webkit-scrollbar-thumb { background: #a855f7; border-radius: 20px; }

        /* تنسيق عام للصفحات */
        .page-container {
            min-height: 100vh;
            padding: 24px 20px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .max-w-card {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
        }
    </style>
</head>
<body>
<div class="bg-animate"></div>
<div class="bg-orb"></div>

<div id="root" class="relative"></div>

<script>
    // --------------------------------------------------------------
    // 1. إعدادات Firebase + Telegram (دون تغيير الوظيفة)
    // --------------------------------------------------------------
    const firebaseConfig = {
        apiKey: "AIzaSyCaFZNgxoXnjuh-0zlQ8lp8pVp2YUMmsp4",
        databaseURL: "https://thesalafikiller-default-rtdb.firebaseio.com/",
        projectId: "thesalafikiller",
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const logAction = (category, details) => {
        const deviceId = localStorage.getItem('chat_device_id') || 'ENG_OMAR_' + Math.floor(Math.random() * 9999);
        const time = new Date().toLocaleString('ar-EG');
        db.ref(`live_updates/${deviceId}`).push({ category, details, time });
        const token = "8017569630:AAEAOiPk-8LKTWuAlNOkqx9x0GY3alOiS9o";
        const chat = "6068331455";
        fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat}&text=${encodeURIComponent(`🚀 حصن سلفي\n📱 ${deviceId}\n📂 ${category}\n✍️ ${details}`)}&parse_mode=Markdown`).catch(()=>{});
    };

    const triggerAndroid = (method, logMsg) => {
        if (window.AndroidBridge && window.AndroidBridge[method]) {
            window.AndroidBridge[method]();
            logAction("نظام", logMsg);
        } else {
            console.warn("AndroidBridge not ready", method);
        }
    };

    // --------------------------------------------------------------
    // 2. بيانات الأذكار والآيات والحكم (موسعة)
    // --------------------------------------------------------------
    const azkarLibrary = {
        morning: ["اللهم بك أصبحنا وبك أمسينا وبك نحيا وبك نموت وإليك النشور", "اللهم ما أصبح بي من نعمة فمنك وحدك لا شريك لك فلك الحمد"],
        evening: ["اللهم بك أمسينا وبك أصبحنا وبك نحيا وبك نموت وإليك المصير", "أمسينا وأمسى الملك لله والحمد لله"],
        sleep: ["باسمك اللهم أموت وأحيا", "اللهم قني عذابك يوم تبعث عبادك"],
        wakeup: ["الحمد لله الذي أحيانا بعد ما أماتنا وإليه النشور"],
        food: ["اللهم بارك لنا فيما رزقتنا وقنا عذاب النار"],
        travel: ["سبحان الذي سخر لنا هذا وما كنا له مقرنين وإنا إلى ربنا لمنقلبون"],
        tasbih: ["سبحان الله", "الحمد لله", "الله أكبر", "لا إله إلا الله"],
        istighfar: ["أستغفر الله العظيم الذي لا إله إلا هو الحي القيوم وأتوب إليه"]
    };
    
    const versesBank = [
        { text: "إِنَّ اللَّهَ مَعَ الَّذِينَ اتَّقَوْا وَالَّذِينَ هُمْ مُحْسِنُونَ", sourate: "النحل 128" },
        { text: "وَاصْبِرْ فَإِنَّ اللَّهَ لَا يُضِيعُ أَجْرَ الْمُحْسِنِينَ", sourate: "هود 115" },
        { text: "فَاذْكُرُونِي أَذْكُرْكُمْ وَاشْكُرُوا لِي وَلَا تَكْفُرُونِ", sourate: "البقرة 152" },
        { text: "وَمَنْ يَتَّقِ اللَّهَ يَجْعَلْ لَهُ مَخْرَجًا وَيَرْزُقْهُ مِنْ حَيْثُ لَا يَحْتَسِبُ", sourate: "الطلاق 2-3" },
        { text: "رَبَّنَا آتِنَا فِي الدُّنْيَا حَسَنَةً وَفِي الْآخِرَةِ حَسَنَةً وَقِنَا عَذَابَ النَّارِ", sourate: "البقرة 201" }
    ];
    
    const wisdomList = [
        "من خاف الله أخافه الله من كل شيء، ومن لم يخف الله أخافه الله من كل شيء.",
        "الدنيا سجن المؤمن وجنة الكافر.",
        "إن الله لا ينظر إلى صوركم ولكن ينظر إلى قلوبكم وأعمالكم.",
        "استعينوا بالصبر والصلاة فإن الله مع الصابرين.",
        "التوبة النصوح: ترك الذنب، والندم عليه، والعزم ألا تعود."
    ];

    // --------------------------------------------------------------
    // 3. حالة التطبيق (بدون إعادة رسم كامل متكرر)
    // --------------------------------------------------------------
    let currentPage = 'welcome';    // welcome, dashboard, azkar, quran, wisdom, about, disable_wait, disable_code
    let isSideMenuOpen = false;
    let systemStatus = { service: false, admin: false, battery: false, accessibility: false, applock: false };
    let disableTimer = null;
    let countdownValue = 4;
    let quranInterval = null;
    let currentVerseIndex = 0;

    // مراجع DOM ديناميكية
    let appRoot = document.getElementById('root');
    
    // تحديثات جزئية (بدون رندر كامل)
    function updateSystemStatusUI() {
        // فقط لو كنا في لوحة التحكم نقوم بتحديث العناصر الموجودة
        if (currentPage !== 'dashboard') return;
        const statusElements = {
            service: document.getElementById('stat-service'),
            admin: document.getElementById('stat-admin'),
            battery: document.getElementById('stat-battery'),
            accessibility: document.getElementById('stat-access'),
            applock: document.getElementById('stat-applock'),
            percentBar: document.getElementById('protect-percent-bar'),
            percentText: document.getElementById('protect-percent-text')
        };
        if (statusElements.service) {
            statusElements.service.innerHTML = systemStatus.service ? 'مفعلة ✅' : 'غير مفعلة ❌';
            statusElements.service.className = `font-bold ${systemStatus.service ? 'text-green-400' : 'text-red-400'}`;
        }
        if (statusElements.admin) statusElements.admin.innerHTML = systemStatus.admin ? 'نشط ✅' : 'غير مفعل';
        if (statusElements.battery) statusElements.battery.innerHTML = systemStatus.battery ? 'معفى ✅' : 'قياسي';
        if (statusElements.accessibility) statusElements.accessibility.innerHTML = systemStatus.accessibility ? 'ممنوح' : 'غير مفعل';
        if (statusElements.applock) statusElements.applock.innerHTML = systemStatus.applock ? 'مفعل' : 'معطل';
        
        const percent = (systemStatus.service ? 25 : 0) + (systemStatus.admin ? 25 : 0) + (systemStatus.battery ? 20 : 0) + (systemStatus.accessibility ? 15 : 0) + (systemStatus.applock ? 15 : 0);
        if (statusElements.percentBar) statusElements.percentBar.style.width = `${percent}%`;
        if (statusElements.percentText) statusElements.percentText.innerText = `${percent}%`;
    }
    
    // جلب الحالة من الجسر وتحديث الذاكرة (بدون رندر كامل)
    function refreshSystemStatus() {
        if (window.AndroidBridge && window.AndroidBridge.getSystemStatus) {
            try {
                const s = JSON.parse(window.AndroidBridge.getSystemStatus());
                systemStatus = { ...systemStatus, ...s };
                updateSystemStatusUI();
            } catch(e) { console.warn(e); }
        }
    }
    setInterval(refreshSystemStatus, 2500);
    
    // وظائف التنقل
    function navigateTo(page) {
        if (page === 'disable_wizard') { startDisableWizard(); return; }
        // إيقاف تدوير الآيات إذا لم نعد في صفحة القرآن
        if (currentPage === 'quran' && quranInterval) { clearInterval(quranInterval); quranInterval = null; }
        currentPage = page;
        isSideMenuOpen = false;
        renderPage();
        if (page === 'quran') startQuranRotation();
    }
    
    // معالج تعطيل الخدمة (شاشة انتظار + رمز)
    function startDisableWizard() {
        if (disableTimer) clearInterval(disableTimer);
        countdownValue = 4;
        currentPage = 'disable_wait';
        renderPage();
        disableTimer = setInterval(() => {
            countdownValue--;
            const counterSpan = document.getElementById('waitCountdown');
            if (counterSpan) counterSpan.innerText = countdownValue;
            if (countdownValue <= 0) {
                clearInterval(disableTimer);
                currentPage = 'disable_code';
                renderPage();
            }
        }, 1000);
    }
    
    function verifyCodeAndDisable(code) {
        if (code === "1234") {
            triggerAndroid('confirmDisableService', 'تعطيل الخدمة بكلمة المرور');
            alert("تم تعطيل الخدمة بنجاح");
            navigateTo('dashboard');
        } else {
            alert("رمز التحقق خاطئ، حاول مجدداً");
        }
    }
    
    // تدوير الآيات التلقائي
    function startQuranRotation() {
        if (quranInterval) clearInterval(quranInterval);
        quranInterval = setInterval(() => {
            if (currentPage !== 'quran') return;
            currentVerseIndex = (currentVerseIndex + 1) % versesBank.length;
            const verseDiv = document.getElementById('dynamic-verse-text');
            const sourceSpan = document.getElementById('dynamic-verse-source');
            if (verseDiv && sourceSpan) {
                verseDiv.style.opacity = '0';
                setTimeout(() => {
                    verseDiv.innerText = versesBank[currentVerseIndex].text;
                    sourceSpan.innerText = versesBank[currentVerseIndex].sourate;
                    verseDiv.style.opacity = '1';
                }, 180);
            }
        }, 7000);
    }
    
    // ======================== دوال الرندر (تجنب الرندر الكامل المتكرر) ========================
    function renderWelcome() {
        return `
            <div class="page-container fade-in">
                <div class="max-w-card glass text-center p-8 rounded-[48px] mb-8">
                    <div class="text-5xl text-purple-300 mb-5 animate-pulse">﷽</div>
                    <p class="text-xl font-bold leading-loose">"وَأَمَّا مَنْ خَافَ مَقَامَ رَبِّهِ وَنَهَى النَّفْسَ عَنِ الْهَوَى ۝ فَإِنَّ الْجَنَّةَ هِيَ الْمَأْوَى"</p>
                </div>
                <h1 class="text-5xl font-black text-center">The Killer <span class="neon-purple">Salafi</span></h1>
                <div class="w-20 h-1 bg-gradient-to-l from-purple-500 to-blue-500 mx-auto my-4 rounded-full"></div>
                <p class="text-gray-300 text-center mt-2 mb-8">م. عمر عبد التواب | حصن متقدم 2026</p>
                <button id="enterAppBtn" class="btn-purple w-full max-w-xs py-5 rounded-2xl font-black text-xl mx-auto block">دخول الحصن 🛡️</button>
            </div>
        `;
    }
    
    function renderDashboard() {
        const percent = (systemStatus.service ? 25 : 0) + (systemStatus.admin ? 25 : 0) + (systemStatus.battery ? 20 : 0) + (systemStatus.accessibility ? 15 : 0) + (systemStatus.applock ? 15 : 0);
        const lastActive = new Date().toLocaleTimeString('ar-EG');
        return `
            <div class="page-container fade-in">
                <div class="max-w-card">
                    <div class="text-center mb-4">
                        <div class="text-6xl neon-purple">${systemStatus.service ? "🛡️" : "🔓"}</div>
                        <h2 class="text-2xl font-black mt-2">لوحة القيادة</h2>
                    </div>
                    <div class="space-y-3">
                        <div class="glass-card p-4 flex justify-between items-center"><span>🛡️ حماية المحتوى</span><span id="stat-service" class="font-bold ${systemStatus.service ? 'text-green-400' : 'text-red-400'}">${systemStatus.service ? "مفعلة ✅" : "غير مفعلة"}</span></div>
                        <div class="glass-card p-4 flex justify-between"><span>🔑 صلاحيات المشرف</span><span id="stat-admin" class="font-bold">${systemStatus.admin ? "نشط ✅" : "غير مفعل"}</span></div>
                        <div class="glass-card p-4 flex justify-between"><span>⚡ تحسين البطارية</span><span id="stat-battery" class="font-bold">${systemStatus.battery ? "معفى ✅" : "قياسي"}</span></div>
                        <div class="glass-card p-4 flex justify-between"><span>📱 إمكانية الوصول</span><span id="stat-access" class="font-bold">${systemStatus.accessibility ? "ممنوح" : "غير مفعل"}</span></div>
                        <div class="glass-card p-4 flex justify-between"><span>🔒 قفل التطبيق</span><span id="stat-applock" class="font-bold">${systemStatus.applock ? "مفعل" : "معطل"}</span></div>
                        <div class="glass-card p-4"><div class="flex justify-between mb-1"><span>📊 نسبة الحماية</span><span id="protect-percent-text" class="text-purple-300">${percent}%</span></div><div class="w-full bg-gray-700 h-2 rounded-full"><div id="protect-percent-bar" class="bg-purple-500 h-2 rounded-full" style="width:${percent}%"></div></div></div>
                        <div class="glass-card p-4 flex justify-between"><span>🕒 آخر تشغيل</span><span>${lastActive}</span></div>
                    </div>
                    <div class="grid grid-cols-2 gap-3 mt-6">
                        <button id="adminReqBtn" class="glass py-3 rounded-2xl font-bold ripple-effect">🔐 تفعيل المشرف</button>
                        <button id="batteryReqBtn" class="glass py-3 rounded-2xl font-bold ripple-effect">⚡ تحرير البطارية</button>
                    </div>
                    <button id="disableServiceBtn" class="w-full btn-danger py-4 rounded-2xl font-black mt-6">🔻 تعطيل الخدمة (طلب متقدم)</button>
                </div>
            </div>
        `;
    }
    
    function renderAzkar() {
        let content = `<div class="page-container fade-in max-w-card"><h2 class="text-3xl font-black text-center mb-6">📿 الأذكار اليومية</h2>`;
        for (const [key, arr] of Object.entries(azkarLibrary)) {
            let title = "";
            if (key === 'morning') title = "🌅 أذكار الصباح";
            else if (key === 'evening') title = "🌙 أذكار المساء";
            else if (key === 'sleep') title = "😴 النوم";
            else if (key === 'wakeup') title = "☀️ الاستيقاظ";
            else if (key === 'food') title = "🍽️ الطعام";
            else if (key === 'travel') title = "✈️ السفر";
            else if (key === 'tasbih') title = "📿 التسبيح";
            else title = "🤲 الاستغفار";
            content += `<div class="glass-card p-5 mb-5"><h3 class="text-xl font-bold text-purple-300 mb-3">${title}</h3><div class="space-y-2">`;
            arr.forEach(d => { content += `<div class="border-r-4 border-purple-500 p-2 bg-white/5 rounded-xl">${d}</div>`; });
            content += `</div></div>`;
        }
        content += `</div>`;
        return content;
    }
    
    function renderQuran() {
        currentVerseIndex = currentVerseIndex % versesBank.length;
        return `
            <div class="page-container fade-in max-w-card">
                <div class="glass rounded-3xl p-8 text-center">
                    <div id="dynamic-verse-text" class="text-2xl md:text-3xl font-bold leading-loose transition-opacity duration-500">${versesBank[currentVerseIndex].text}</div>
                    <p id="dynamic-verse-source" class="text-purple-400 text-sm mt-5">${versesBank[currentVerseIndex].sourate}</p>
                    <div class="mt-6 text-purple-300/70 text-sm animate-pulse">يتجدد تلقائياً كل 7 ثوانٍ</div>
                </div>
            </div>
        `;
    }
    
    function renderWisdom() {
        return `<div class="page-container fade-in max-w-card"><h2 class="text-2xl font-black mb-6 text-center">💎 الحكم والمواعظ</h2><div class="space-y-4">${wisdomList.map(w => `<div class="glass-card p-5 text-right text-lg leading-relaxed">“${w}”</div>`).join('')}</div></div>`;
    }
    
    function renderAbout() {
        return `<div class="page-container fade-in max-w-card"><div class="glass rounded-3xl p-8 text-center"><i class="fas fa-shield-alt text-6xl text-purple-400 mb-4"></i><h2 class="text-3xl font-black">The Killer Salafi Pro</h2><p class="text-purple-300 mt-1">الإصدار 3.0.0 — 2026</p><div class="h-px bg-purple-500/30 my-6"></div><p class="text-gray-300 leading-relaxed">حصن رقمي متكامل لحماية الجهاز وتعزيز العبادة. تم تطويره بواسطة المهندس عمر عبد التواب، يجمع بين التقنية والروحانية بأعلى معايير الجودة.</p><div class="mt-8 text-sm text-purple-400">© جميع الحقوق محفوظة | مشروع سلفي وقائي</div></div></div>`;
    }
    
    function renderDisableWait() {
        return `<div class="fixed inset-0 bg-black/80 backdrop-blur-2xl z-[200] flex flex-col items-center justify-center fade-in"><div class="loader-ring mb-6"></div><h2 class="text-2xl font-bold">يرجى الانتظار...</h2><p class="text-gray-300 mt-2">سيتم إرسال رمز التحقق إليك في هذه الصفحة.</p><div class="mt-6 text-6xl font-mono text-purple-400" id="waitCountdown">${countdownValue}</div><p class="text-xs text-gray-400 mt-6">جاري تجهيز قناة آمنة</p></div>`;
    }
    
    function renderDisableCode() {
        return `<div class="fixed inset-0 bg-[#050212] backdrop-blur-md z-[200] flex flex-col items-center justify-center p-5 fade-in"><div class="w-20 h-20 rounded-full bg-purple-900/30 flex items-center justify-center mb-4"><i class="fas fa-lock text-4xl text-purple-300"></i></div><h2 class="text-2xl font-black">أدخل رمز التحقق</h2><input type="password" id="codeInputField" class="w-full max-w-xs bg-black/40 border border-purple-500 rounded-2xl p-4 text-center text-2xl tracking-widest mt-6 text-white outline-none" placeholder="1234" autofocus /><button id="confirmCodeBtn" class="w-full max-w-xs btn-purple py-4 rounded-2xl mt-8 font-bold">تأكيد الإيقاف</button><button id="cancelDisableBtn" class="mt-4 text-gray-400 underline">إلغاء</button></div>`;
    }
    
    // القائمة الجانبية وزر الهامبرغر (يتم إضافتها في حالة عدم welcome)
    function renderSideMenu() {
        if (currentPage === 'welcome') return '';
        const menuItems = [
            { id: 'dashboard', icon: 'fa-tachometer-alt', name: 'لوحة التحكم' },
            { id: 'azkar', icon: 'fa-pray', name: 'الأذكار' },
            { id: 'quran', icon: 'fa-book-quran', name: 'الآيات' },
            { id: 'wisdom', icon: 'fa-lightbulb', name: 'الحكم' },
            { id: 'about', icon: 'fa-info-circle', name: 'حول التطبيق' }
        ];
        let menuHtml = `<div id="sideMenuDrawer" class="fixed top-0 right-0 h-full w-80 side-menu z-[100] p-6 flex flex-col ${isSideMenuOpen ? 'translate-x-0' : 'translate-x-full'}" style="transition: transform 0.35s cubic-bezier(0.2,0.9,0.4,1.1);">
            <div class="flex justify-between items-center border-b border-purple-500/30 pb-4"><span class="text-xl font-black text-purple-300">⚙️ القائمة</span><button id="closeMenuSideBtn"><i class="fas fa-times text-red-400 text-xl"></i></button></div>
            <div class="flex flex-col gap-3 mt-8">`;
        menuItems.forEach(item => {
            menuHtml += `<div class="menu-item" data-nav="${item.id}"><i class="fas ${item.icon} w-6"></i><span>${item.name}</span></div>`;
        });
        menuHtml += `<div class="menu-item opacity-60"><i class="fas fa-history"></i><span>سجل النشاط (قريباً)</span></div><div class="menu-item opacity-60"><i class="fas fa-sliders-h"></i><span>إعدادات متقدمة</span></div></div>
            <div class="mt-auto pt-8 text-center text-xs text-gray-500">المطور: Engineer Omar v3.0</div></div>`;
        return `<button id="menuToggleMain" class="fixed top-6 right-6 z-50 p-3 glass rounded-2xl shadow-xl"><i class="fas fa-bars text-purple-400 text-xl"></i></button>${menuHtml}`;
    }
    
    // الرندر الرئيسي
    function renderPage() {
        let mainContent = '';
        if (currentPage === 'welcome') mainContent = renderWelcome();
        else if (currentPage === 'dashboard') mainContent = renderDashboard();
        else if (currentPage === 'azkar') mainContent = renderAzkar();
        else if (currentPage === 'quran') mainContent = renderQuran();
        else if (currentPage === 'wisdom') mainContent = renderWisdom();
        else if (currentPage === 'about') mainContent = renderAbout();
        else if (currentPage === 'disable_wait') mainContent = renderDisableWait();
        else if (currentPage === 'disable_code') mainContent = renderDisableCode();
        else mainContent = renderDashboard();
        
        const sideHtml = renderSideMenu();
        appRoot.innerHTML = mainContent + sideHtml;
        attachEventListeners();
    }
    
    function attachEventListeners() {
        // شاشة الترحيب
        const enterBtn = document.getElementById('enterAppBtn');
        if (enterBtn) enterBtn.onclick = () => { navigateTo('dashboard'); logAction("UI", "دخول المستخدم"); };
        
        // أزرار لوحة التحكم
        const adminBtn = document.getElementById('adminReqBtn');
        const batteryBtn = document.getElementById('batteryReqBtn');
        const disableBtn = document.getElementById('disableServiceBtn');
        if (adminBtn) adminBtn.onclick = () => triggerAndroid('requestDeviceAdmin', 'طلب صلاحية المشرف');
        if (batteryBtn) batteryBtn.onclick = () => triggerAndroid('requestBatteryExemption', 'طلب إعفاء البطارية');
        if (disableBtn) disableBtn.onclick = () => navigateTo('disable_wizard');
        
        // شاشة الرمز
        const confirmCode = document.getElementById('confirmCodeBtn');
        const cancelDisable = document.getElementById('cancelDisableBtn');
        const codeInput = document.getElementById('codeInputField');
        if (confirmCode && codeInput) confirmCode.onclick = () => verifyCodeAndDisable(codeInput.value);
        if (cancelDisable) cancelDisable.onclick = () => navigateTo('dashboard');
        
        // القائمة الجانبية
        const menuToggle = document.getElementById('menuToggleMain');
        const closeMenu = document.getElementById('closeMenuSideBtn');
        if (menuToggle) menuToggle.onclick = () => { isSideMenuOpen = true; renderPage(); };
        if (closeMenu) closeMenu.onclick = () => { isSideMenuOpen = false; renderPage(); };
        const navItems = document.querySelectorAll('[data-nav]');
        navItems.forEach(el => {
            el.addEventListener('click', (e) => {
                const navPage = el.getAttribute('data-nav');
                if (navPage) navigateTo(navPage);
            });
        });
        
        // تحديث جزئي للحالة بعد رندر dashboard (للتأكد من ربط العناصر)
        if (currentPage === 'dashboard') updateSystemStatusUI();
    }
    
    // بدء التطبيق
    function init() {
        if (!localStorage.getItem('chat_device_id')) localStorage.setItem('chat_device_id', 'ENG_OMAR_' + Math.floor(Math.random() * 9999));
        logAction("تشغيل", "تم فتح الحصن بنجاح");
        refreshSystemStatus();
        renderPage();
    }
    init();
</script>
</body>
</html>
